<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — MAMA Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#1A4F8B,#0d2e57); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 20px; padding: 44px 40px; width: 400px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px; display: block; }
    h2 { font-size: 1.3rem; font-weight: 800; color: #1A4F8B; margin-bottom: 4px; }
    p { font-size: 0.83rem; color: #888; margin-bottom: 28px; }
    input { width: 100%; border: 1.5px solid #ddd; border-radius: 10px; padding: 12px 14px; font-size: 0.9rem; outline: none; transition: .2s; margin-bottom: 14px; }
    input:focus { border-color: #2E75B6; box-shadow: 0 0 0 3px rgba(46,117,182,0.12); }
    button { width: 100%; background: #1A4F8B; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: .2s; }
    button:hover { background: #0d2e57; }
    .msg { font-size: 0.85rem; margin-top: 16px; padding: 12px; border-radius: 10px; display: none; }
    .msg.ok  { background: #e6f9ee; color: #1a7a40; }
    .msg.err { background: #fff0f0; color: #c0392b; }
  </style>
</head>
<body>
<div class="card">
  <img src="mama_logo.png" class="logo" onerror="this.src='mama_logo.jpg'" alt="MAMA"/>
  <h2>Set New Password</h2>
  <p id="subtext">Enter your new admin password below.</p>

  <div id="formArea">
    <input type="password" id="pw1" placeholder="New password (min. 8 characters)" />
    <input type="password" id="pw2" placeholder="Confirm new password" />
    <button onclick="doReset()">Update Password</button>
  </div>

  <div class="msg ok"  id="msgOk">✅ Password updated! <a href="admin.html" style="color:#1a7a40;font-weight:700;">Go to Admin Login →</a></div>
  <div class="msg err" id="msgErr"></div>
</div>

<script>
  const SB_URL = 'https://tjxposrskeoobldopbac.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqeHBvc3Jza2Vvb2JsZG9wYmFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODMxMDcsImV4cCI6MjA4OTg1OTEwN30.cwHrt7h72g5Gv_YgSMGuIxvP0z8rkvU8R0Rx1AKdNOU';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  // Supabase embeds the recovery token in the URL hash — handle it on load
  window.addEventListener('load', async () => {
    const hash = window.location.hash;
    // Supabase v2 puts tokens in hash as #access_token=...&type=recovery
    if (!hash.includes('access_token') && !hash.includes('type=recovery') && !hash.includes('code=')) {
      showErr('No valid reset token found in this link. Please request a new password reset email.');
      document.getElementById('formArea').style.display = 'none';
    }
    // Supabase JS automatically parses the hash and establishes a session
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      // Try exchanging code if PKCE flow
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (code) {
        const { error } = await sb.auth.exchangeCodeForSession(code);
        if (error) {
          showErr('Token expired or invalid. Please request a new password reset email.');
          document.getElementById('formArea').style.display = 'none';
        }
      }
    }
  });

  async function doReset() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    if (pw1.length < 8) { showErr('Password must be at least 8 characters.'); return; }
    if (pw1 !== pw2)    { showErr('Passwords do not match.'); return; }

    const { error } = await sb.auth.updateUser({ password: pw1 });
    if (error) { showErr('Error: ' + error.message); return; }

    document.getElementById('formArea').style.display = 'none';
    document.getElementById('msgErr').style.display = 'none';
    document.getElementById('msgOk').style.display = 'block';
  }

  function showErr(msg) {
    const el = document.getElementById('msgErr');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
